name: Cloudflare Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}
      CF_D1_DATABASE_NAME: ${{ secrets.CF_D1_DATABASE_NAME || 'genfix-db' }}
      NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SYNC_SECRET_NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      SYNC_SECRET_TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      SYNC_SECRET_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      SYNC_SECRET_R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SYNC_SECRET_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      SYNC_SECRET_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SYNC_SECRET_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      SYNC_SECRET_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      SYNC_SECRET_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SYNC_SECRET_RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      SYNC_SECRET_RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
      SYNC_SECRET_UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      SYNC_SECRET_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SYNC_SECRET_CF_D1_DATABASE_NAME: ${{ secrets.CF_D1_DATABASE_NAME || 'genfix-db' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required deployment inputs
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${CF_D1_DATABASE_NAME}"

      - name: Sync GitHub secrets to Cloudflare Worker secrets
        run: bash ./scripts/sync-github-secrets.sh

      - name: Apply D1 migrations (remote)
        run: pnpm db:migrate:remote

      - name: Build OpenNext bundle
        run: pnpm cf:build

      - name: Deploy to Cloudflare Workers
        run: pnpm cf:deploy
