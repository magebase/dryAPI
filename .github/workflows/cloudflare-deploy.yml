name: Cloudflare Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}
      CF_D1_DATABASE_NAME: ${{ secrets.CF_D1_DATABASE_NAME || 'genfix-db' }}
      NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_MARKETING_LIST_ID: ${{ secrets.BREVO_MARKETING_LIST_ID }}
      BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
      BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
      CRM_AUTOMATION_DISPATCH_URL: ${{ secrets.CRM_AUTOMATION_DISPATCH_URL }}
      CRM_AUTOMATION_API_TOKEN: ${{ secrets.CRM_AUTOMATION_API_TOKEN }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SYNC_SECRET_NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      SYNC_SECRET_TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      SYNC_SECRET_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      SYNC_SECRET_R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SYNC_SECRET_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      SYNC_SECRET_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SYNC_SECRET_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      SYNC_SECRET_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      SYNC_SECRET_BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      SYNC_SECRET_BREVO_MARKETING_LIST_ID: ${{ secrets.BREVO_MARKETING_LIST_ID }}
      SYNC_SECRET_BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
      SYNC_SECRET_BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
      SYNC_SECRET_CRM_AUTOMATION_DISPATCH_URL: ${{ secrets.CRM_AUTOMATION_DISPATCH_URL }}
      SYNC_SECRET_CRM_AUTOMATION_API_TOKEN: ${{ secrets.CRM_AUTOMATION_API_TOKEN }}
      SYNC_SECRET_UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      SYNC_SECRET_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      SYNC_SECRET_CF_D1_DATABASE_NAME: ${{ secrets.CF_D1_DATABASE_NAME || 'genfix-db' }}
      SECRET_SYNC_CONCURRENCY: ${{ vars.SYNC_SECRET_CONCURRENCY || '4' }}
      SECRET_SYNC_RETRIES: '6'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Takumi OG metadata coverage
        run: pnpm og:verify

      - name: Run main app tests
        run: pnpm test

      - name: Run Cloudflare API integration tests
        run: pnpm test:cf:integration

      - name: Prepare Stripe portal outputs
        id: stripe_portal
        env:
          STRIPE_PRIVATE_KEY: ${{ secrets.STRIPE_PRIVATE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          STRIPE_PORTAL_CONFIGURATION_ID: ${{ secrets.STRIPE_PORTAL_CONFIGURATION_ID }}
          STRIPE_PORTAL_CONFIGURATION_NAME: ${{ secrets.STRIPE_PORTAL_CONFIGURATION_NAME }}
          STRIPE_PORTAL_RETURN_URL: ${{ secrets.STRIPE_PORTAL_RETURN_URL }}
          STRIPE_PORTAL_BUSINESS_HEADLINE: ${{ secrets.STRIPE_PORTAL_BUSINESS_HEADLINE }}
          STRIPE_PORTAL_PRIVACY_POLICY_URL: ${{ secrets.STRIPE_PORTAL_PRIVACY_POLICY_URL }}
          STRIPE_PORTAL_TERMS_URL: ${{ secrets.STRIPE_PORTAL_TERMS_URL }}
          STRIPE_PORTAL_BASIC_PRODUCT_ID: ${{ secrets.STRIPE_PORTAL_BASIC_PRODUCT_ID }}
          STRIPE_PORTAL_BASIC_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PORTAL_BASIC_MONTHLY_PRICE_ID }}
          STRIPE_PORTAL_BASIC_ANNUAL_PRICE_ID: ${{ secrets.STRIPE_PORTAL_BASIC_ANNUAL_PRICE_ID }}
          STRIPE_PORTAL_GROWTH_PRODUCT_ID: ${{ secrets.STRIPE_PORTAL_GROWTH_PRODUCT_ID }}
          STRIPE_PORTAL_GROWTH_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PORTAL_GROWTH_MONTHLY_PRICE_ID }}
          STRIPE_PORTAL_GROWTH_ANNUAL_PRICE_ID: ${{ secrets.STRIPE_PORTAL_GROWTH_ANNUAL_PRICE_ID }}
          STRIPE_PORTAL_PRO_PRODUCT_ID: ${{ secrets.STRIPE_PORTAL_PRO_PRODUCT_ID }}
          STRIPE_PORTAL_PRO_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PORTAL_PRO_MONTHLY_PRICE_ID }}
          STRIPE_PORTAL_PRO_ANNUAL_PRICE_ID: ${{ secrets.STRIPE_PORTAL_PRO_ANNUAL_PRICE_ID }}
        run: |
          set -euo pipefail

          portal_env_file="${RUNNER_TEMP}/stripe-portal.env"
          sync_env_file="${RUNNER_TEMP}/stripe-portal-sync.env"

          : > "${portal_env_file}"
          : > "${sync_env_file}"

          append_env_var() {
            local name="$1"
            local value="${!name:-}"

            if [[ -z "${value}" ]]; then
              return
            fi

            printf '%s=%q\n' "${name}" "${value}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_%s=%q\n' "${name}" "${value}" >> "${sync_env_file}"
          }

          append_env_var "STRIPE_PRIVATE_KEY"
          append_env_var "STRIPE_PORTAL_CONFIGURATION_ID"
          append_env_var "STRIPE_PORTAL_CONFIGURATION_NAME"
          append_env_var "STRIPE_PORTAL_RETURN_URL"
          append_env_var "STRIPE_PORTAL_BUSINESS_HEADLINE"
          append_env_var "STRIPE_PORTAL_PRIVACY_POLICY_URL"
          append_env_var "STRIPE_PORTAL_TERMS_URL"
          append_env_var "STRIPE_PORTAL_BASIC_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_BASIC_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_BASIC_ANNUAL_PRICE_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_ANNUAL_PRICE_ID"
          append_env_var "STRIPE_PORTAL_PRO_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_PRO_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_PRO_ANNUAL_PRICE_ID"

          if [[ -n "${NEXT_PUBLIC_SITE_URL:-}" ]]; then
            printf 'NEXT_PUBLIC_SITE_URL=%q\n' "${NEXT_PUBLIC_SITE_URL}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_NEXT_PUBLIC_SITE_URL=%q\n' "${NEXT_PUBLIC_SITE_URL}" >> "${sync_env_file}"
          fi

          if [[ -n "${SITE_URL:-}" ]]; then
            printf 'SITE_URL=%q\n' "${SITE_URL}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_SITE_URL=%q\n' "${SITE_URL}" >> "${sync_env_file}"
          fi

          portal_enabled="false"
          if [[ -n "${STRIPE_PRIVATE_KEY:-}" ]]; then
            portal_enabled="true"
          fi

          sync_enabled="false"
          if [[ -s "${sync_env_file}" ]]; then
            sync_enabled="true"
          fi

          echo "portal_enabled=${portal_enabled}" >> "${GITHUB_OUTPUT}"
          echo "sync_enabled=${sync_enabled}" >> "${GITHUB_OUTPUT}"
          echo "portal_env_file=${portal_env_file}" >> "${GITHUB_OUTPUT}"
          echo "sync_env_file=${sync_env_file}" >> "${GITHUB_OUTPUT}"

      - name: Validate required deployment inputs
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${CF_D1_DATABASE_NAME}"

      - name: Expand repository secrets for Cloudflare sync
        env:
          ALL_REPO_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail

          node <<'NODE' >> "$GITHUB_ENV"
          const raw = process.env.ALL_REPO_SECRETS_JSON || "{}";
          let secretMap = {};

          try {
            secretMap = JSON.parse(raw);
          } catch {
            secretMap = {};
          }

          for (const [key, value] of Object.entries(secretMap)) {
            if (!/^[A-Z_][A-Z0-9_]*$/.test(key)) {
              continue;
            }

            if (typeof value !== "string" || value.length === 0) {
              continue;
            }

            process.stdout.write(`SYNC_SECRET_${key}<<__SYNC_SECRET_EOF__\n${value}\n__SYNC_SECRET_EOF__\n`);
          }
          NODE

      - name: Sync GitHub secrets to Cloudflare Worker secrets
        run: |
          set -euo pipefail

          if [[ "${{ steps.stripe_portal.outputs.sync_enabled }}" == "true" ]]; then
            set -a
            # shellcheck source=/dev/null
            source "${{ steps.stripe_portal.outputs.sync_env_file }}"
            set +a
          fi

          bash ./scripts/sync-github-secrets.sh

      - name: Ensure Stripe billing portal configuration
        if: ${{ steps.stripe_portal.outputs.portal_enabled == 'true' }}
        run: |
          set -euo pipefail

          set -a
          # shellcheck source=/dev/null
          source "${{ steps.stripe_portal.outputs.portal_env_file }}"
          set +a

          pnpm stripe:portal:ensure

      - name: Skip Stripe billing portal configuration
        if: ${{ steps.stripe_portal.outputs.portal_enabled != 'true' }}
        run: echo "Skipping Stripe portal ensure (missing STRIPE_PRIVATE_KEY)."

      - name: Apply D1 migrations (remote)
        run: pnpm db:migrate:remote
      - name: Deploy to Cloudflare Workers
        run: pnpm cf:deploy

  deploy-hub:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.HUB_SITE_URL || 'https://apiscore.dev' }}
      BETTER_AUTH_SECRET: ${{ secrets.HUB_BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.HUB_BETTER_AUTH_URL }}
      BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.HUB_BETTER_AUTH_TRUSTED_ORIGINS }}
      GOOGLE_CLIENT_ID: ${{ secrets.HUB_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.HUB_GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.HUB_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.HUB_GITHUB_CLIENT_SECRET }}

    defaults:
      run:
        working-directory: apps/hub

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: apps/hub/pnpm-lock.yaml

      - name: Validate required deployment inputs
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"

      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (hub / auth)
        run: pnpm db:migrate:remote:auth

      - name: Apply D1 migrations (hub / analytics)
        run: pnpm db:migrate:remote:analytics

      - name: Deploy hub to Cloudflare Workers
        run: pnpm cf:deploy

  test-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hub
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: apps/hub/pnpm-lock.yaml

      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hub tests
        run: pnpm test

  test-cf-e2e:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Cloudflare API E2E env
        run: cp .env.test.example .env.test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Cloudflare API E2E tests
        run: pnpm test:cf:e2e
