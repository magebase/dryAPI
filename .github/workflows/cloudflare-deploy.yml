name: Cloudflare Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: .git,.next,.open-next,coverage,playwright-report,test-results,node_modules
          format: table
          exit-code: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: ${{ secrets.CLOUDFLARE_WORKER_NAME }}
      GH_ACTIONS_DATABASE_URL: ${{ secrets.GH_ACTIONS_DATABASE_URL }}
      NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL || vars.SITE_URL || secrets.SITE_URL }}
      SITE_URL: ${{ vars.SITE_URL || secrets.SITE_URL || vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
      CLOUDFLARE_AI_SEARCH_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_AI_SEARCH_ACCOUNT_ID || secrets.CLOUDFLARE_AI_SEARCH_SERVICE_CF_API_ID }}
      CLOUDFLARE_AI_SEARCH_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_SEARCH_API_TOKEN || secrets.CLOUDFLARE_AI_SEARCH_MANAGER_TOKEN || secrets.CLOUDFLARE_AI_SEARCH_TOKEN }}
      CLOUDFLARE_AI_SEARCH_INDEX: ${{ secrets.CLOUDFLARE_AI_SEARCH_INDEX || secrets.CLOUDFLARE_AI_SEARCH_NAME }}
      CLOUDFLARE_AI_SEARCH_TOKEN_ID: ${{ secrets.CLOUDFLARE_AI_SEARCH_TOKEN_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_MARKETING_LIST_ID: ${{ secrets.BREVO_MARKETING_LIST_ID }}
      BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
      BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
      SYNC_SECRET_NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
      SYNC_SECRET_TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
      SYNC_SECRET_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      SYNC_SECRET_R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SYNC_SECRET_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      SYNC_SECRET_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      SYNC_SECRET_R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      SYNC_SECRET_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      SYNC_SECRET_BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      SYNC_SECRET_BREVO_MARKETING_LIST_ID: ${{ secrets.BREVO_MARKETING_LIST_ID }}
      SYNC_SECRET_BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
      SYNC_SECRET_BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
      SECRET_SYNC_CONCURRENCY: ${{ vars.SYNC_SECRET_CONCURRENCY || '8' }}
      SECRET_SYNC_RETRIES: "6"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next/OpenNext cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .open-next/cache
          key: ${{ runner.os }}-root-opennext-cache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-root-opennext-cache-${{ github.ref_name }}-
            ${{ runner.os }}-root-opennext-cache-

      - name: Resolve Drizzle cache KV namespace ID
        run: |
          set -euo pipefail

          namespace_title="drizzle_cache_kv_prod"
          namespace_id="$({
            curl -fsSL \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces?per_page=1000" \
              | jq -r --arg title "${namespace_title}" '.result[] | select(.title == $title) | .id'
          } | head -n1)"

          if [[ -z "${namespace_id}" || "${namespace_id}" == "null" ]]; then
            namespace_id="$({
              curl -fsSL -X POST \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
                --data "{\"title\":\"${namespace_title}\"}" \
                | jq -r '.result.id'
            })"
          fi

          if [[ -z "${namespace_id}" || "${namespace_id}" == "null" ]]; then
            echo "Failed to resolve KV namespace ID for ${namespace_title}."
            exit 1
          fi

          node - "${namespace_id}" <<'NODE'
          const fs = require('node:fs')

          const namespaceId = process.argv[2]
          const configPath = 'wrangler.jsonc'
          const original = fs.readFileSync(configPath, 'utf8')
          const updated = original.replace('"id": "drizzle_cache_kv_prod"', `"id": "${namespaceId}"`)

          if (updated === original) {
            throw new Error('Failed to update wrangler.jsonc DRIZZLE_CACHE_KV namespace id')
          }

          fs.writeFileSync(configPath, updated)
          NODE

      - name: Validate production site URL
        run: |
          set -euo pipefail

          site_url="${NEXT_PUBLIC_SITE_URL:-${SITE_URL:-}}"
          if [[ -z "${site_url}" ]]; then
            echo "Missing production site URL. Set NEXT_PUBLIC_SITE_URL or SITE_URL."
            exit 1
          fi

          site_url="${site_url%/}"
          printf 'NEXT_PUBLIC_SITE_URL=%q\n' "${site_url}" >> "$GITHUB_ENV"
          printf 'SITE_URL=%q\n' "${site_url}" >> "$GITHUB_ENV"
          printf 'SYNC_SECRET_CLOUDFLARE_AI_SEARCH_SOURCE=%q\n' "${site_url}" >> "$GITHUB_ENV"

      - name: Ensure Cloudflare notification policies
        run: pnpm cf:notifications:ensure

      - name: Ensure AI Search instance is bound to the production domain
        run: pnpm cf:chatbot:ai-search:ensure

      - name: Verify Takumi OG metadata coverage
        run: pnpm og:verify

      - name: Run main app tests
        run: pnpm test

      - name: Run Cloudflare API integration tests
        run: pnpm test:cf:integration

      - name: Prepare Stripe portal outputs
        id: stripe_portal
        env:
          STRIPE_PRIVATE_KEY: ${{ secrets.STRIPE_PRIVATE_KEY }}
          STRIPE_PORTAL_CONFIGURATION_ID: ${{ secrets.STRIPE_PORTAL_CONFIGURATION_ID }}
          STRIPE_PORTAL_CONFIGURATION_NAME: ${{ secrets.STRIPE_PORTAL_CONFIGURATION_NAME }}
          STRIPE_PORTAL_RETURN_URL: ${{ secrets.STRIPE_PORTAL_RETURN_URL }}
          STRIPE_PORTAL_BUSINESS_HEADLINE: ${{ secrets.STRIPE_PORTAL_BUSINESS_HEADLINE }}
          STRIPE_PORTAL_PRIVACY_POLICY_URL: ${{ secrets.STRIPE_PORTAL_PRIVACY_POLICY_URL }}
          STRIPE_PORTAL_TERMS_URL: ${{ secrets.STRIPE_PORTAL_TERMS_URL }}
        run: |
          set -euo pipefail

          portal_env_file="${RUNNER_TEMP}/stripe-portal.env"
          sync_env_file="${RUNNER_TEMP}/stripe-portal-sync.env"

          : > "${portal_env_file}"
          : > "${sync_env_file}"

          append_env_var() {
            local name="$1"
            local value="${!name:-}"

            if [[ -z "${value}" ]]; then
              return
            fi

            printf '%s=%q\n' "${name}" "${value}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_%s=%q\n' "${name}" "${value}" >> "${sync_env_file}"
          }

          append_env_var "STRIPE_PRIVATE_KEY"
          append_env_var "STRIPE_PORTAL_CONFIGURATION_ID"
          append_env_var "STRIPE_PORTAL_CONFIGURATION_NAME"
          append_env_var "STRIPE_PORTAL_RETURN_URL"
          append_env_var "STRIPE_PORTAL_BUSINESS_HEADLINE"
          append_env_var "STRIPE_PORTAL_PRIVACY_POLICY_URL"
          append_env_var "STRIPE_PORTAL_TERMS_URL"
          append_env_var "STRIPE_PORTAL_BASIC_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_BASIC_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_BASIC_ANNUAL_PRICE_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_GROWTH_ANNUAL_PRICE_ID"
          append_env_var "STRIPE_PORTAL_PRO_PRODUCT_ID"
          append_env_var "STRIPE_PORTAL_PRO_MONTHLY_PRICE_ID"
          append_env_var "STRIPE_PORTAL_PRO_ANNUAL_PRICE_ID"

          if [[ -n "${NEXT_PUBLIC_SITE_URL:-}" ]]; then
            printf 'NEXT_PUBLIC_SITE_URL=%q\n' "${NEXT_PUBLIC_SITE_URL}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_NEXT_PUBLIC_SITE_URL=%q\n' "${NEXT_PUBLIC_SITE_URL}" >> "${sync_env_file}"
          fi

          if [[ -n "${SITE_URL:-}" ]]; then
            printf 'SITE_URL=%q\n' "${SITE_URL}" >> "${portal_env_file}"
            printf 'SYNC_SECRET_SITE_URL=%q\n' "${SITE_URL}" >> "${sync_env_file}"
          fi

          sync_enabled="false"
          if [[ -s "${sync_env_file}" ]]; then
            sync_enabled="true"
          fi

          echo "sync_enabled=${sync_enabled}" >> "${GITHUB_OUTPUT}"
          echo "portal_env_file=${portal_env_file}" >> "${GITHUB_OUTPUT}"
          echo "sync_env_file=${sync_env_file}" >> "${GITHUB_OUTPUT}"

      - name: Validate required deployment inputs
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${GH_ACTIONS_DATABASE_URL}"

      - name: Expand repository secrets for Cloudflare sync
        env:
          ALL_REPO_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail

          node <<'NODE' >> "$GITHUB_ENV"
          const raw = process.env.ALL_REPO_SECRETS_JSON || "{}";
          let secretMap = {};

          try {
            secretMap = JSON.parse(raw);
          } catch {
            secretMap = {};
          }

          for (const [key, value] of Object.entries(secretMap)) {
            if (!/^[A-Z_][A-Z0-9_]*$/.test(key)) {
              continue;
            }

            if (typeof value !== "string" || value.length === 0) {
              continue;
            }

            process.stdout.write(`SYNC_SECRET_${key}<<__SYNC_SECRET_EOF__\n${value}\n__SYNC_SECRET_EOF__\n`);
          }
          NODE

      - name: Resolve internal auth secret
        run: |
          set -euo pipefail

          internal_api_key="${SYNC_SECRET_INTERNAL_API_KEY:-${SYNC_SECRET_API_KEY:-${SYNC_SECRET_DASHBOARD_API_KEY:-${SYNC_SECRET_DEAPI_API_KEY:-${SYNC_SECRET_BETTER_AUTH_SECRET:-}}}}}"

          if [[ -z "${internal_api_key}" ]]; then
            echo "No internal auth secret was provided; continuing without SYNC_SECRET_INTERNAL_API_KEY."
          else
            printf 'SYNC_SECRET_INTERNAL_API_KEY<<__SYNC_SECRET_EOF__\n%s\n__SYNC_SECRET_EOF__\n' "${internal_api_key}" >> "$GITHUB_ENV"
          fi

      - name: Ensure Stripe SaaS products and prices
        run: |
          set -euo pipefail

          if [[ -z "${SYNC_SECRET_STRIPE_PRIVATE_KEY:-}" ]]; then
            echo "SYNC_SECRET_STRIPE_PRIVATE_KEY is required before upserting Stripe SaaS products and prices."
            exit 1
          fi

          export STRIPE_PRIVATE_KEY="${SYNC_SECRET_STRIPE_PRIVATE_KEY}"

          plans_env_file="${RUNNER_TEMP}/stripe-saas-plans.env"
          pnpm exec tsx scripts/stripe-saas-plans-ensure.ts --write-env "${plans_env_file}"

          cat "${plans_env_file}" >> "$GITHUB_ENV"

      - name: Ensure Stripe billing portal configuration
        run: |
          set -euo pipefail

          set -a
          # shellcheck source=/dev/null
          source "${{ steps.stripe_portal.outputs.portal_env_file }}"
          set +a

          pnpm stripe:portal:ensure

      - name: Apply PostgreSQL migrations
        run: pnpm db:migrate

      - name: Ensure OpenNext cache bucket exists
        run: |
          set -euo pipefail

          cache_bucket="dryapi-site-opennext-cache"
          if ! pnpm exec wrangler r2 bucket info "${cache_bucket}" --config wrangler.jsonc >/dev/null 2>&1; then
            pnpm exec wrangler r2 bucket create "${cache_bucket}" --config wrangler.jsonc
          fi

      - name: Build OpenNext bundle
        run: pnpm cf:build

      - name: Deploy to Cloudflare Workers
        run: |
          set -euo pipefail

          max_attempts=3
          for attempt in $(seq 1 ${max_attempts}); do
            if pnpm cf:deploy:only; then
              exit 0
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Cloudflare deploy failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$(( attempt * 20 ))
            echo "Cloudflare deploy attempt ${attempt}/${max_attempts} failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Sync GitHub secrets to Cloudflare Worker secrets
        run: |
          set -euo pipefail

          if [[ "${{ steps.stripe_portal.outputs.sync_enabled }}" == "true" ]]; then
            set -a
            # shellcheck source=/dev/null
            source "${{ steps.stripe_portal.outputs.sync_env_file }}"
            set +a
          fi

          bash ./scripts/sync-github-secrets.sh

  deploy-api:
    runs-on: ubuntu-latest
    needs: [deploy]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve API remote D1 database IDs
        run: pnpm exec tsx scripts/resolve-d1-config.ts cloudflare/api/wrangler.toml dryapi-api-analytics dryapi-api-queue-metrics

      - name: Expand repository secrets for Cloudflare sync
        env:
          ALL_REPO_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail

          node <<'NODE' >> "$GITHUB_ENV"
          const raw = process.env.ALL_REPO_SECRETS_JSON || "{}";
          let secretMap = {};

          try {
            secretMap = JSON.parse(raw);
          } catch {
            secretMap = {};
          }

          for (const [key, value] of Object.entries(secretMap)) {
            if (!/^[A-Z_][A-Z0-9_]*$/.test(key)) {
              continue;
            }

            if (typeof value !== "string" || value.length === 0) {
              continue;
            }

            process.stdout.write(`SYNC_SECRET_${key}<<__SYNC_SECRET_EOF__\n${value}\n__SYNC_SECRET_EOF__\n`);
          }
          NODE

      - name: Resolve internal auth secret
        run: |
          set -euo pipefail

          internal_api_key="${SYNC_SECRET_INTERNAL_API_KEY:-${SYNC_SECRET_API_KEY:-${SYNC_SECRET_DASHBOARD_API_KEY:-${SYNC_SECRET_DEAPI_API_KEY:-${SYNC_SECRET_BETTER_AUTH_SECRET:-}}}}}"

          if [[ -z "${internal_api_key}" ]]; then
            echo "No internal auth secret was provided; continuing without SYNC_SECRET_INTERNAL_API_KEY."
          else
            printf 'SYNC_SECRET_INTERNAL_API_KEY<<__SYNC_SECRET_EOF__\n%s\n__SYNC_SECRET_EOF__\n' "${internal_api_key}" >> "$GITHUB_ENV"
          fi

      - name: Ensure API runpod batch queue exists
        working-directory: cloudflare/api
        run: |
          set -euo pipefail

          queue_name="dryapi-runpod-batch"
          if ! "${GITHUB_WORKSPACE}/node_modules/.bin/wrangler" queues info "${queue_name}" --config wrangler.toml >/dev/null 2>&1; then
            "${GITHUB_WORKSPACE}/node_modules/.bin/wrangler" queues create "${queue_name}" --config wrangler.toml
          fi

      - name: Ensure API account export queue exists
        working-directory: cloudflare/api
        run: |
          set -euo pipefail

          queue_name="dryapi-account-exports"
          if ! "${GITHUB_WORKSPACE}/node_modules/.bin/wrangler" queues info "${queue_name}" --config wrangler.toml >/dev/null 2>&1; then
            "${GITHUB_WORKSPACE}/node_modules/.bin/wrangler" queues create "${queue_name}" --config wrangler.toml
          fi

      - name: Resolve API queue metrics KV namespace ID
        working-directory: cloudflare/api
        run: |
          set -euo pipefail

          namespace_title="queue_metrics_kv_prod"
          namespace_id="$({
            curl -fsSL \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces?per_page=1000" \
              | jq -r --arg title "${namespace_title}" '.result[] | select(.title == $title) | .id'
          } | head -n1)"

          if [[ -z "${namespace_id}" || "${namespace_id}" == "null" ]]; then
            namespace_id="$({
              curl -fsSL -X POST \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
                --data "{\"title\":\"${namespace_title}\"}" \
                | jq -r '.result.id'
            })"
          fi

          if [[ -z "${namespace_id}" || "${namespace_id}" == "null" ]]; then
            echo "Failed to resolve KV namespace ID for ${namespace_title}."
            exit 1
          fi

          node - "${namespace_id}" <<'NODE'
          const fs = require('node:fs')

          const namespaceId = process.argv[2]
          const configPath = 'wrangler.toml'
          const original = fs.readFileSync(configPath, 'utf8')
          const updated = original.replace('id = "queue_metrics_kv_prod"', `id = "${namespaceId}"`)

          if (updated === original) {
            throw new Error('Failed to update wrangler.toml KV namespace id')
          }

          fs.writeFileSync(configPath, updated)
          NODE

      - name: Deploy API worker to Cloudflare Workers
        working-directory: cloudflare/api
        run: |
          set -euo pipefail

          max_attempts=3
          for attempt in $(seq 1 ${max_attempts}); do
            if "${GITHUB_WORKSPACE}/node_modules/.bin/wrangler" deploy --config wrangler.toml; then
              exit 0
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "API deploy failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$(( attempt * 20 ))
            echo "API deploy attempt ${attempt}/${max_attempts} failed; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Sync GitHub secrets to Cloudflare API worker secrets
        working-directory: cloudflare/api
        run: bash ../../scripts/sync-github-secrets.sh

  test-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/hub
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: apps/hub/pnpm-lock.yaml

      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hub tests
        run: pnpm test

  test-cf-e2e:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.3.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Cloudflare API E2E env
        run: cp .env.test.example .env.test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Cloudflare API E2E tests
        run: pnpm test:cf:e2e
