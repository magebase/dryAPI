name: Daily Blog Generation

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of blog posts to generate"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GENERATE_COUNT: ${{ github.event.inputs.count || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "${OPENROUTER_API_KEY:-}"

      - name: Generate model keyword pages
        run: |
          set -euo pipefail
          pnpm exec tsx scripts/generate-model-keyword-pages.ts \
            --brand dryapi \
            --state-file content/.model-seo-state.json \
            --max-new-posts "${GENERATE_COUNT}"

      - name: Commit generated content
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain content/blog content/.model-seo-state.json)" ]; then
            echo "No generated content changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/blog content/.model-seo-state.json
          git commit --no-verify -m "chore(content): generate model keyword pages"
          git push
