name: Daily Blog Generation

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of blog posts to generate"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      BLOG_GENERATOR_SECRET: ${{ secrets.BLOG_GENERATOR_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GENERATE_COUNT: ${{ github.event.inputs.count || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "${BLOG_GENERATOR_SECRET}"
          test -n "${GEMINI_API_KEY}"

      - name: Start Next.js API server
        run: |
          set -euo pipefail
          pnpm dev:next > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

      - name: Wait for server readiness
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:3000" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Next.js server did not start in time"
          cat /tmp/next-dev.log
          exit 1

      - name: Generate blog post(s) via endpoint
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST "http://127.0.0.1:3000/api/blog/generate" \
            -H "content-type: application/json" \
            -H "authorization: Bearer ${BLOG_GENERATOR_SECRET}" \
            -d "{\"provider\":\"gemini\",\"model\":\"gemini-3-flash-preview\",\"count\":${GENERATE_COUNT}}")

          echo "${response}" > /tmp/generated-blog-response.json

          node -e '
            const fs = require("node:fs");
            const payload = JSON.parse(fs.readFileSync("/tmp/generated-blog-response.json", "utf8"));
            if (!payload || typeof payload !== "object") {
              throw new Error("Invalid generation response.");
            }
            if ((payload.createdCount ?? 0) < 1) {
              throw new Error(`No blog posts were created. Response: ${JSON.stringify(payload)}`);
            }
            console.log(`createdCount=${payload.createdCount}`);
          '

      - name: Stop Next.js API server
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" || true
          fi

      - name: Commit generated content
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain content/blog)" ]; then
            echo "No content/blog changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/blog
          git commit -m "chore(content): generate daily blog post"
          git push
