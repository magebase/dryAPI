name = "genfix-calcom-container"
main = "src/worker.ts"
compatibility_date = "2026-03-11"
workers_dev = true
routes = [{ pattern = "cal.genfix.com.au/*", zone_name = "genfix.com.au" }]

[vars]
CALCOM_FORCE_MINIMAL_STARTUP = "false"

[triggers]
crons = ["0 * * * *", "15 2 * * *"]

[[containers]]
class_name = "CalcomContainer"
image = "./Dockerfile"
image_build_context = "."
instance_type = "standard"
max_instances = 8

[[durable_objects.bindings]]
name = "CALCOM_CONTAINER"
class_name = "CalcomContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CalcomContainer"]
