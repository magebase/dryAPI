name = "dryapi-api"
main = "src/worker.ts"
compatibility_date = "2026-03-14"
workers_dev = true

[[durable_objects.bindings]]
name = "API_KEY_QUOTA_DO"
class_name = "ApiQuotaDurableObject"

[[d1_databases]]
binding = "DB"
database_name = "dryapi-api-analytics"
database_id = "00000000-0000-0000-0000-000000000000"

[[ratelimits]]
name = "EDGE_IP_LIMITER"
# Replace this with your real Cloudflare rate limit namespace id.
namespace_id = "1001"
simple = { limit = 500, period = 60 }

[[migrations]]
tag = "v1_api_key_quota_do"
new_sqlite_classes = ["ApiQuotaDurableObject"]

[vars]
# Public API key required by clients (set in your deploy secrets)
# Example: API_KEY = "sk-prod-..."
API_KEY = ""
# The origin URL where the Next.js internal API is reachable (OpenNext worker hostname)
ORIGIN_URL = ""
# A service/internal API key used when proxying to the origin Next API (optional)
INTERNAL_API_KEY = ""

# Cloudflare edge and API-key quota controls.
# Keep EDGE_IP_LIMIT_PER_MINUTE aligned with the ratelimit config above.
EDGE_IP_LIMIT_PER_MINUTE = "500"
API_KEY_LIMIT_PER_MINUTE = "300"
API_KEY_LIMIT_PER_DAY = "20000"

# RunPod direct dispatch settings (optional)
# If these are unset, the gateway falls back to proxying requests to ORIGIN_URL.
RUNPOD_API_KEY = ""
RUNPOD_API_BASE_URL = "https://api.runpod.ai/v2"

# Optional global or per-surface job mode override: run | runsync
# RUNPOD_DEFAULT_MODE = "runsync"
# RUNPOD_CHAT_MODE = "runsync"
# RUNPOD_IMAGES_MODE = "runsync"
# RUNPOD_EMBEDDINGS_MODE = "runsync"
# RUNPOD_TRANSCRIBE_MODE = "runsync"

# Route-specific endpoint IDs.
RUNPOD_ENDPOINT_ID_CHAT = ""
RUNPOD_ENDPOINT_ID_IMAGES = ""
RUNPOD_ENDPOINT_ID_EMBEDDINGS = ""
RUNPOD_ENDPOINT_ID_TRANSCRIBE = ""

# Optional model/surface map for dynamic endpoint resolution.
# Examples:
# RUNPOD_ENDPOINT_MAP_JSON = '{"surfaces":{"images":"abc123"},"models":{"Flux1schnell":"def456"}}'
# RUNPOD_ENDPOINT_MAP_JSON = '{"images":"abc123","Flux1schnell":"def456"}'
RUNPOD_ENDPOINT_MAP_JSON = ""

# Dynamic pricing policy (worker-managed quotes + analytics).
# 200% minimum profit floor is enforced as min profit multiple = 3x cost.
RUNPOD_PRICING_MIN_PROFIT_MULTIPLE = "3"
RUNPOD_PRICING_LOOKBACK_HOURS = "24"
RUNPOD_PRICING_RECALC_MIN_INTERVAL_SECONDS = "60"
RUNPOD_PRICING_ROUND_STEP_USD = "0.0001"
# Optional full pricing policy map (defaults/surfaces/models/endpoints).
# RUNPOD_PRICING_CONFIG_JSON = '{"defaults":{"gpuCostPerSecondUsd":0.00055,"infraCostUsd":0.00005,"paymentFeeFraction":0.04,"retrySafetyFraction":0.12}}'
RUNPOD_PRICING_CONFIG_JSON = ""

# Optional webhook signing/timing controls.
# WEBHOOK_SIGNING_SECRET = ""
# WEBHOOK_TIMEOUT_MS = "8000"

# Optional websocket payload threshold; larger payloads return download links instead of inline frames.
# WS_INLINE_MAX_BYTES = "65536"

[env.test]
workers_dev = true

[[env.test.durable_objects.bindings]]
name = "API_KEY_QUOTA_DO"
class_name = "ApiQuotaDurableObject"

[[env.test.d1_databases]]
binding = "DB"
database_name = "dryapi-api-analytics-test"
database_id = "11111111-1111-1111-1111-111111111111"

[[env.test.ratelimits]]
name = "EDGE_IP_LIMITER"
namespace_id = "1001"
simple = { limit = 500, period = 60 }

[env.test.vars]
API_KEY = ""
ORIGIN_URL = ""
INTERNAL_API_KEY = ""
EDGE_IP_LIMIT_PER_MINUTE = "500"
API_KEY_LIMIT_PER_MINUTE = "300"
API_KEY_LIMIT_PER_DAY = "20000"
RUNPOD_API_KEY = ""
RUNPOD_API_BASE_URL = "https://api.runpod.ai/v2"
RUNPOD_ENDPOINT_ID_CHAT = ""
RUNPOD_ENDPOINT_ID_IMAGES = ""
RUNPOD_ENDPOINT_ID_EMBEDDINGS = ""
RUNPOD_ENDPOINT_ID_TRANSCRIBE = ""
RUNPOD_ENDPOINT_MAP_JSON = ""
RUNPOD_PRICING_MIN_PROFIT_MULTIPLE = "3"
RUNPOD_PRICING_LOOKBACK_HOURS = "24"
RUNPOD_PRICING_RECALC_MIN_INTERVAL_SECONDS = "1"
RUNPOD_PRICING_ROUND_STEP_USD = "0.0001"
RUNPOD_PRICING_CONFIG_JSON = ""
